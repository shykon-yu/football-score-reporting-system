; 时区
date.timezone = Asia/Shanghai

; 上传与执行限制
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 300
max_input_time = 300
max_file_uploads = 20

; 内存限制 (Laravel 10 建议放宽)
memory_limit = 1G

; 错误显示 (本地开发保持开启)
display_errors = On
error_reporting = E_ALL
log_errors = On

; 安全：隐藏 PHP 版本
expose_php = Off

; Opcache 优化 (本地开发专属配置)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0        ; 开发环境设为0，改代码立即生效，线上改为60
opcache.validate_timestamps = 1    ; 配合上面的 0 使用

; PHP 8.2 JIT 加速
opcache.jit = 1255
opcache.jit_buffer_size = 128M

; 会话安全
session.auto_start = 0
session.cookie_httponly = 1
