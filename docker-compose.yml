services:
    football:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        container_name: football-app
        user: "1000:1000"
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini

            # 挂载vendor
            - football_vendor:/var/www/html/vendor
            # 命名卷保护 node_modules
            #- football_node_modules:/var/www/html/node_modules
        environment:
            - TZ=Asia/Shanghai
            - COMPOSER_ALLOW_SUPERUSER=1 #本地开发无所谓，上线打包要删掉，允许 root 运行 composer 存在安全风险。
            # 新增，解决容器内 www-data 写本地目录权限
            - PUID=1000
            - PGID=1000
        # 全部启动后再启动 laravel
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - laravel-net
        labels:
            dev.orbstack.domains: footballbbs.test  #自动域名

    # Nginx 反向代理容器
    nginx:
        image: nginx:1.25-alpine
        container_name: football-nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
#        depends_on:
#            - football
        depends_on:
            football:
                condition: service_started # 明确指定条件，或者干脆去掉 Nginx 的 depends_on，因为 Nginx 本身有重试机制
        networks:
            - laravel-net

    # MySQL 8.0（稳定版）
    mysql:
        image: mysql:8.0.36
        container_name: football-mysql  # 更新容器名称
        restart: unless-stopped
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root123456}"
            MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
            MYSQL_USER: "${DB_USERNAME:-root}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-root123456}"
            TZ: Asia/Shanghai
        volumes:
            - mysql-data:/var/lib/mysql
            - ./docker/data/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
        command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        networks:
            - laravel-net
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123456}"]
            retries: 3
            timeout: 5s
            interval: 10s

    # Redis 7
    redis:
        image: redis:7.2-alpine
        container_name: football-redis
        restart: unless-stopped
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - redis-data:/data
        command: redis-server --appendonly yes
        networks:
            - laravel-net
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

    # RabbitMQ 3.13 LTS（稳定版）
    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: football-rabbitmq
        restart: unless-stopped
        ports:
            - "${FORWARD_RABBITMQ_PORT:-5672}:5672"
            - "${FORWARD_RABBITMQ_MGMT:-15672}:15672"
        environment:
            RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-admin}"
            RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-admin123}"
            TZ: Asia/Shanghai
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        networks:
            - laravel-net
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            retries: 3
            timeout: 5s
            interval: 10s

networks:
    laravel-net:
        driver: bridge


volumes:
    football_vendor:
    #football_node_modules:
    mysql-data:
    redis-data:
    rabbitmq-data:
